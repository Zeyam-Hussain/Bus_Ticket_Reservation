version: '3.8'

# ================================================================
# Bus Reservation System — Docker Compose
# ================================================================
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f
#   Rebuild: docker compose up -d --build
# ================================================================

services:

  # ── MySQL 8 Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bus_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: bus_reservation_system
      MYSQL_USER: bus_user
      MYSQL_PASSWORD: bus_password_123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bus_user", "-pbus_password_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── PHP + Apache App ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bus-reservation-system:latest
    container_name: bus_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Application
      APP_ENV: production
      ALLOWED_ORIGIN: http://localhost:8080

      # Database — points to the db service name
      DB_HOST: db
      DB_NAME: bus_reservation_system
      DB_USER: bus_user
      DB_PASS: bus_password_123

      # JWT
      JWT_SECRET_KEY: VPRGXSP5oRlxTRpgoEn3UfOqbHD8z/P6Yt3xCCET8Ck=
      JWT_ALGORITHM: HS256
      JWT_EXPIRY: 900
      REFRESH_TOKEN_EXPIRY: 604800

      # Admin
      ADMIN_CREATION_SECRET: Fast123@

      # SMTP — change these to working credentials before sharing
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: zeyam0888@gmail.com
      SMTP_PASS: xebq khht lhno uvhs
      SMTP_FROM: ZeyamDaewoo@gmail.com
      SMTP_FROM_NAME: Bus Reservation System

      # API
      API_BASE_URL: http://localhost:8080/api

volumes:
  db_data:
    driver: local
