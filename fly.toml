# fly.toml app configuration file generated for bus-reservation-system

app = "" # You can leave this blank or fill it in with your app name
primary_region = "bos" # Change to your preferred region (e.g., "ams", "hkg", "lax")

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
